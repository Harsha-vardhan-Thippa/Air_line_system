<!DOCTYPE html>

<html>

<head>

    <title>Airline Booking</title>

    <style>

        body{
            font-family: Arial;
            background-color:#f4f6f9;
            margin:0;
            padding:0;
        }

        .container{
            width:50%;
            margin:auto;
            margin-top:40px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            color:#333;
        }

        .top-links{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
        }

        .top-links a{
            text-decoration:none;
            background:#007bff;
            color:white;
            padding:8px 15px;
            border-radius:5px;
        }

        .top-links a:hover{
            background:#0056b3;
        }

        form{
            margin-top:20px;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:8px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            background:#28a745;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#218838;
        }

        .message{
            background:#d4edda;
            color:#155724;
            padding:10px;
            border-radius:5px;
            margin-bottom:15px;
        }

        .welcome{
            color:#444;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>Flights</h2>

    {% if user.is_authenticated %}

    <div class="top-links">

        <p class="welcome">
            Welcome {{ user.username }}
        </p>

        <div>

            <a href="/booking/">
                Your Bookings
            </a>

            <a href="/logout/">
                Logout
            </a>

        </div>

    </div>

    {% else %}

    <div class="top-links">

        <a href="/login/">
            Login
        </a>

    </div>

    {% endif %}

    <hr>

    {% if messages %}

        {% for message in messages %}
            <div class="message">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
    <form method="POST">
        {% csrf_token %}

        <label>Source</label>

        <input
            type="text"
            name="source"
            placeholder="Enter source"
        >

        <label>Destination</label>

        <input
            type="text"
            name="destination"
            placeholder="Enter destination"
        >

        <label>Date</label>

        <input
            type="date"
            name="date"
        >

        <button type="submit">

            Search Flights

        </button>

    </form>

</div>
{% if request.session.download_url %}
<script>
window.open(
    "{{ request.session.download_url }}"
)
</script>
{% endif %}
</body>
</html>
