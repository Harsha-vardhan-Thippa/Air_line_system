<!DOCTYPE html>

<html>

<head>

    <title>Payment Page</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial;
            background:#f4f6f9;
        }

        .container{
            width:40%;
            margin:auto;
            margin-top:50px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            color:#333;
            margin-bottom:25px;
        }

        .flight-details{
            background:#f8f9fa;
            padding:15px;
            border-radius:8px;
            margin-bottom:25px;
        }

        .flight-details p{
            font-size:18px;
            color:#444;
        }

        .price{
            color:green;
            font-weight:bold;
            font-size:20px;
        }

        h3{
            color:#333;
            margin-bottom:15px;
        }

        .payment-option{
            background:#f8f9fa;
            padding:12px;
            border-radius:5px;
            margin-bottom:12px;
        }

        button{
            width:100%;
            padding:14px;
            background:#28a745;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
            margin-top:20px;
        }

        button:hover{
            background:#218838;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>Payment</h2>

    <div class="flight-details">

        <p>

            <strong>Flight:</strong>
            {{ flight.flight_name }}

        </p>

        <p>

            <strong>Flight Number:</strong>
            {{ flight.flight_number }}

        </p>

        <p>

            <strong>From:</strong>
            {{ flight.source }}

        </p>

        <p>

            <strong>To:</strong>
            {{ flight.destination }}

        </p>

        <p class="price">

            Total Price:
            ₹{{ total_price }}

        </p>

    </div>

    <form method="POST">

        {% csrf_token %}

        <h3>Select Payment Method</h3>

        <div class="payment-option">

            <input
                type="radio"
                name="payment_method"
                value="PhonePe"
            >

            PhonePe

        </div>

        <div class="payment-option">

            <input
                type="radio"
                name="payment_method"
                value="Google Pay"
            >

            Google Pay

        </div>

        <div class="payment-option">

            <input
                type="radio"
                name="payment_method"
                value="Amazon Pay"
            >

            Amazon Pay

        </div>

        <div class="payment-option">

            <input
                type="radio"
                name="payment_method"
                value="Razorpay"
            >

            Razorpay

        </div>

        <div class="payment-option">

            <input
                type="radio"
                name="payment_method"
                value="Paypal"
            >

            Paypal

        </div>

        <button type="submit">

            Book Flight

        </button>

    </form>

</div>

</body>

</html>
