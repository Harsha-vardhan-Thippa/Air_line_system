<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<style>
body{
margin:0;
padding:0;
font-family:Arial;
background:#f4f6f9;
}
.register-box{
width:350px;
margin:auto;
margin-top:100px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}
h2{
text-align:center;
color:#333;
margin-bottom:25px;
}
input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
font-size:15px;
}
button{
width:100%;
padding:12px;
background:#28a745;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}
button:hover{
background:#218838;
}
.message{
text-align:center;
color:#007bff;
margin-top:15px;
}
.login-link{
display:block;
text-align:center;
margin-top:15px;
text-decoration:none;
color:#007bff;
}
.login-link:hover{
text-decoration:underline;
}
</style>
</head>
<body>
<div class="register-box">
<h2>Register</h2>
<form method="POST">
{% csrf_token %}
<input
name="username"
placeholder="Enter Username"
>
<input
type="email"
name="email"
placeholder="Enter Email"
>
<input
type="password"
name="password"
placeholder="Enter Password"
>
<button>
Register
</button>
</form>
{% if message %}
<p class="message">
{{ message }}
</p>
{% endif %}
<a
href="/login/"
class="login-link"
>
Already have an account? Login
</a>
</div>
</body>
</html>
